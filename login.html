<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechStore | Acceder</title>
    <link rel="stylesheet" href="CSS/style.css" />

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  </head>
  <body>
    <header class="main-header">
      <div class="logo"><a href="index.html">TechStore</a></div>
      <nav class="user-actions">
        <button id="themeToggle" class="theme-btn" title="Cambiar tema">
          🌙
        </button>
        <a href="index.html">← Volver a la tienda</a>
      </nav>
    </header>

    <main
      style="
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 85vh;
      "
    >
      <div
        class="card fade-in"
        style="
          max-width: 450px;
          width: 100%;
          padding: 3rem 2.5rem;
          text-align: center;
          box-shadow: var(--shadow-hover);
          border-top: 4px solid var(--primary-color);
        "
      >
        <h1
          id="auth-title"
          style="
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
          "
        >
          Bienvenido de nuevo
        </h1>
        <p id="auth-desc" style="color: var(--text-muted); margin-bottom: 2rem">
          Inicia sesión para acceder a tus pedidos.
        </p>

        <button
          id="btn-login-google"
          class="btn-primary"
          style="
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            padding: 1rem;
            width: 100%;
            transition: all 0.3s ease;
          "
        >
          <img
            src="https://www.svgrepo.com/show/475656/google-color.svg"
            alt="Google"
            style="width: 24px"
          />
          Continuar con Google
        </button>

        <div
          style="
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
          "
        >
          <hr
            style="
              flex: 1;
              border: none;
              border-top: 1px solid var(--border-color);
            "
          />
          <span style="padding: 0 10px">o usa tu correo</span>
          <hr
            style="
              flex: 1;
              border: none;
              border-top: 1px solid var(--border-color);
            "
          />
        </div>

        <form id="form-auth" style="text-align: left">
          <div style="margin-bottom: 1rem">
            <label
              style="
                font-size: 0.9rem;
                color: var(--text-muted);
                font-weight: bold;
              "
              >Correo Electrónico</label
            >
            <input
              type="email"
              id="auth-email"
              required
              class="input-pro"
              placeholder="correo@ejemplo.com"
            />
          </div>
          <div style="margin-bottom: 1.5rem">
            <label
              style="
                font-size: 0.9rem;
                color: var(--text-muted);
                font-weight: bold;
              "
              >Contraseña</label
            >
            <input
              type="password"
              id="auth-pass"
              required
              class="input-pro"
              placeholder="••••••••"
              minlength="6"
            />
          </div>

          <button
            type="submit"
            id="btn-auth-action"
            class="btn-primary"
            style="width: 100%; padding: 1rem; font-size: 1.1rem"
          >
            Iniciar Sesión
          </button>
        </form>

        <p
          style="
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
          "
        >
          <span id="auth-switch-text">¿No tienes cuenta?</span>
          <a
            href="#"
            id="toggle-auth-mode"
            style="
              color: var(--primary-color);
              font-weight: bold;
              text-decoration: none;
            "
            >Regístrate aquí</a
          >
        </p>
      </div>
    </main>

    <script src="JavaScript/productos.js"></script>
    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/auth.js"></script>
  </body>
</html>
